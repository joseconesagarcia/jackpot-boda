<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jackpot Quiz: un juego rapido y vistoso para Jose y Mica."
    />
    <meta name="theme-color" content="#10231b" />
    <link rel="icon" type="image/svg+xml" href="/joseymica/assets/favicon-5ssAdHOf.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Jose y Mica | Jackpot Quiz</title>
    <script type="module" crossorigin src="/joseymica/assets/index-QGs5hi5H.js"></script>
    <link rel="stylesheet" crossorigin href="/joseymica/assets/index-B5e2TeYZ.css">
  </head>
  <body>
    <div class="page-shell">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>

      <div id="app">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Quiz privado</p>
            <h1 class="logo">Jackpot Quiz</h1>
          </div>

          <section class="scoreboard" aria-label="Marcador del juego">
            <p class="score-label">Bote acumulado</p>
            <div class="money-display" id="money-display">
              <span class="currency">EUR</span>
              <span id="money-amount" data-value="0">0</span>
            </div>

            <div class="score-meta">
              <span id="progress-label">Pregunta 1</span>
            </div>
          </section>
        </header>

        <main class="game-grid">
          <section class="card card--question" id="question-card">
            <div class="prize-row">
              <div class="prize-tag" id="prize-tag">
                Premio de esta ronda: 100 EUR
              </div>
            </div>

            <h2 id="question-text" class="question-text">
              Cargando pregunta...
            </h2>
            <p id="status-line" class="question-helper">
              Escribe tu respuesta para seguir sumando.
            </p>

            <form id="answer-form" class="answer-form">
              <label class="sr-only" for="answer-input">Tu respuesta</label>
              <input
                type="text"
                id="answer-input"
                class="answer-input"
                placeholder="Escribe tu respuesta aqui"
                autocomplete="off"
              />
              <button type="submit" class="submit-btn" id="submit-btn">
                Apostar todo
              </button>
            </form>

            <div
              id="feedback-message"
              class="feedback-message"
              aria-live="polite"
            ></div>
          </section>
        </main>

        <div class="modal" id="modal" style="display: none;">
          <div class="modal-content">
            <p class="modal-kicker">Resultado</p>
            <h1 id="modal-title" class="neon-text">JACKPOT</h1>
            <h2 id="modal-subtitle">Has ganado el premio maximo.</h2>

            <div class="final-prize">
              <span class="currency">EUR</span>
              <span id="modal-money">600</span>
            </div>

            <p id="modal-message">
              Increible jugada. Te llevas el cierre con toda la fanfarria.
            </p>
            <button id="restart-btn" class="submit-btn">Jugar de nuevo</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
